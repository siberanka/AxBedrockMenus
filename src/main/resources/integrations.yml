integrations:
  axgraves:
    enabled: true
    plugin: AxGraves
    title: AxGraves
    aliases: [axgraves, graves, grave]
    alias-paths: [command-aliases]
    menu-files: [config.yml, data.json, menus.yml, menu.yml, gui.yml, guis.yml, menus/*.yml, gui/*.yml, guis/*.yml]
    quick-actions:
      - text: "My graves"
        command: "%base% list"
        permission: "axgraves.list"
        description: "List your active graves."
      - text: "Help"
        command: "%base% help"
        permission: "axgraves.help"
        description: "Show AxGraves player help."
    fallback-buttons:
      - text: "%menu.back%"
        command: "axgraves"
  axtrade:
    enabled: true
    plugin: AxTrade
    title: AxTrade
    aliases: [axtrade, trade, trades]
    alias-paths: [command-aliases]
    menu-files: [guis.yml, config.yml, currencies.yml, toggled.yml, menus.yml, menu.yml, gui.yml, menus/*.yml, gui/*.yml, guis/*.yml]
    quick-actions:
      - text: "Send trade request"
        command: "abm:select-player:%base% %target%"
        permission: "axtrade.trade"
        description: "Choose an online player from a Bedrock form."
      - text: "Accept trade request"
        command: "abm:select-player:%base% accept %target%"
        permission: "axtrade.trade"
        description: "Accept a selected player's pending request."
      - text: "Deny trade request"
        command: "abm:select-player:%base% deny %target%"
        permission: "axtrade.trade"
        description: "Deny a selected player's pending request."
      - text: "Toggle trade requests"
        command: "%base% toggle"
        permission: "axtrade.toggle"
        description: "Enable or disable incoming trade requests."
    fallback-buttons:
      - text: "%menu.open-default%"
        command: "trade"
  axvaults:
    enabled: true
    plugin: AxVaults
    title: AxVaults
    aliases: [axvaults, vaults, vault, pv, playervaults]
    alias-paths: [player-command-aliases]
    menu-files: [config.yml, menus.yml, menu.yml, gui.yml, guis.yml, vaults.yml, menus/*.yml, gui/*.yml, guis/*.yml]
    quick-actions:
      - text: "Vault selector"
        command: "%base%"
        permission: "axvaults.selector"
        description: "Open the AxVaults selector."
      - text: "Vault 1"
        command: "%base% 1"
        permission: "axvaults.openremote"
        description: "Open vault #1 directly."
      - text: "Vault 2"
        command: "%base% 2"
        permission: "axvaults.openremote"
        description: "Open vault #2 directly."
      - text: "Vault 3"
        command: "%base% 3"
        permission: "axvaults.openremote"
        description: "Open vault #3 directly."
      - text: "Vault 4"
        command: "%base% 4"
        permission: "axvaults.openremote"
        description: "Open vault #4 directly."
      - text: "Vault 5"
        command: "%base% 5"
        permission: "axvaults.openremote"
        description: "Open vault #5 directly."
    fallback-buttons:
      - text: "%menu.open-default%"
        command: "vaults"
  axshulkers:
    enabled: true
    plugin: AxShulkers
    title: AxShulkers
    aliases: [axshulkers, shulker, shulkers]
